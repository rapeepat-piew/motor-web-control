<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motor Control System</title>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;600&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0155a5; --success: #146133; --danger: #b80000;
            --bg: #f4f7f9; --card-bg: #ffffff; --text: #1c1e21;
        }
        body { font-family: 'Inter', 'Chakra Petch', sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { width: 100%; max-width: 400px; padding: 20px; box-sizing: border-box; }
        .card { background: var(--card-bg); padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; display: none; }
        .active { display: block; }
        h1 { font-size: 22px; color: var(--primary); margin-bottom: 20px; }
        .input-group { text-align: left; margin-bottom: 15px; }
        label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 5px; color: #555; }
        input { width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 10px; font-size: 16px; box-sizing: border-box; outline: none; }
        input:focus { border-color: var(--primary); }
        input:disabled { background: #f1f3f5; color: #333; border-color: #e9ecef; font-weight: bold; }
        .grid-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        button { width: 100%; padding: 14px; border: none; border-radius: 10px; font-size: 15px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:active { transform: scale(0.96); }
        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-gray { background: #6c757d; color: white; }
        .full-btn { grid-column: span 2; }
        .status { margin-top: 15px; font-size: 12px; color: #888; padding: 10px; background: #f8f9fa; border-radius: 8px; }
    </style>
</head>
<body>

<div class="container">
    <div id="page-login" class="card active">
        <h1>Connect to Device</h1>
        <div class="input-group">
            <label>ESP32 IP ADDRESS</label>
            <input type="text" id="ip_addr" placeholder="192.168.1.XX">
        </div>
        <button class="btn-primary" onclick="connect()">ตกลง (CONNECT)</button>
    </div>

    <div id="page-menu" class="card">
        <h1>Main Menu</h1>
        <p style="font-size: 14px; color: #666;">IP: <span id="display_ip"></span></p>
        <div class="grid-buttons">
            <button class="btn-primary" onclick="showPage('page-system')" style="height: 100px;">SYSTEM</button>
            <button class="btn-gray" onclick="showPage('page-settings')" style="height: 100px;">SETTINGS</button>
            <button class="btn-danger full-btn" onclick="showPage('page-login')">DISCONNECT</button>
        </div>
    </div>

    <div id="page-system" class="card">
        <h1>System Control</h1>
        <div class="input-group">
            <label>1. ระยะทางที่ต้องการสั่ง (mm)</label>
            <input type="number" id="sys_dist_input" oninput="calculateSystem()" placeholder="ใส่ระยะที่ต้องการเพิ่ม">
        </div>
        <div class="input-group">
            <label>2. รอบการหมุนครั้งนี้ (Round)</label>
            <input type="text" id="sys_calc_rot" disabled value="0.00">
        </div>
        <div class="input-group">
            <label>3. ตำแหน่งปัจจุบันสะสม (mm)</label>
            <input type="text" id="sys_curr_pos_mm" disabled value="0.00">
        </div>
        <div class="grid-buttons">
            <button class="btn-gray" onclick="showPage('page-menu')">BACK</button>
            <button class="btn-danger" onclick="zeroSystem()">ZERO</button>
            <button class="btn-success full-btn" onclick="runSystem()">RUN MOTOR (เพิ่มระยะ)</button>
        </div>
        <div id="status-sys" class="status">พร้อมทำงาน</div>
    </div>

    <div id="page-settings" class="card">
        <h1>Device Settings</h1>
        <div class="input-group">
            <label>รอบการหมุน (Ref Rotation)</label>
            <input type="number" id="set_rot" value="1">
        </div>
        <div class="input-group">
            <label>ระยะทาง mm (Ref Distance)</label>
            <input type="number" id="set_dist" value="1.0">
        </div>
        <div class="grid-buttons">
            <button class="btn-gray" onclick="showPage('page-menu')">BACK</button>
            <button class="btn-primary" onclick="testRun()">TEST RUN (1 R)</button>
            <button class="btn-success full-btn" onclick="applySettings()">APPLY (SAVE TO ARDUINO)</button>
        </div>
        <div id="status-set" class="status">ตั้งค่าพื้นฐาน</div>
    </div>
</div>

<script>
    let deviceIP = "";
    let refRot = 1;
    let refDist = 1;
    let currentTotalMm = 0; // ตัวแปรเก็บระยะสะสมหน่วยเป็น mm

    function showPage(pageId) {
        document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
    }

    function connect() {
        const ip = document.getElementById('ip_addr').value;
        if(!ip) return alert("กรุณากรอก IP");
        deviceIP = ip;
        document.getElementById('display_ip').innerText = ip;
        localStorage.setItem('last_ip', ip);
        showPage('page-menu');
    }

    document.getElementById('ip_addr').value = localStorage.getItem('last_ip') || "";

    function calculateSystem() {
        const inputMm = parseFloat(document.getElementById('sys_dist_input').value) || 0;
        const calc = (inputMm * refRot) / refDist;
        document.getElementById('sys_calc_rot').value = calc.toFixed(2);
    }

    function runSystem() {
        const inputMm = parseFloat(document.getElementById('sys_dist_input').value);
        if(!inputMm) return alert("กรุณาใส่ระยะทาง");
        
        apiCall(`run?dist=${inputMm}`, 'status-sys', () => {
            // เมื่อส่งสำเร็จ ให้บวกระยะสะสม
            currentTotalMm += inputMm;
            document.getElementById('sys_curr_pos_mm').value = currentTotalMm.toFixed(2);
            document.getElementById('sys_dist_input').value = ""; // ล้างช่องใส่เลข
            document.getElementById('sys_calc_rot').value = "0.00";
        });
    }

    function zeroSystem() {
        apiCall('zero', 'status-sys', () => {
            currentTotalMm = 0; // รีเซ็ตค่าสะสมในเว็บเป็น 0
            document.getElementById('sys_curr_pos_mm').value = "0.00";
        });
    }

    function applySettings() {
        refRot = parseFloat(document.getElementById('set_rot').value);
        refDist = parseFloat(document.getElementById('set_dist').value);
        apiCall(`save?rot=${refRot}&dist=${refDist}`, 'status-set');
    }

    function testRun() {
        const r = document.getElementById('set_rot').value;
        // ส่งคำสั่ง Test โดยอิงจากระยะทางที่ทำให้ได้รอบตามที่ตั้งไว้
        apiCall(`run?dist=${refDist}`, 'status-set');
    }

    function apiCall(path, statusId, callback) {
        const statusEl = document.getElementById(statusId);
        statusEl.innerText = "กำลังส่งคำสั่ง...";
        
        fetch(`http://${deviceIP}/${path}`)
            .then(res => {
                statusEl.innerText = "ส่งคำสั่งสำเร็จ!";
                if(callback) callback();
            })
            .catch(err => {
                statusEl.innerText = "ติดต่อบอร์ดไม่ได้!";
            });
    }
</script>

</body>
</html>
