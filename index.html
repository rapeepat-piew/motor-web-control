<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motor Control Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;600&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0155a5;
            --success: #146133;
            --danger: #b80000;
            --bg: #f8f9fa;
            --card-bg: #ffffff;
            --text: #1c1e21;
        }

        body {
            font-family: 'Inter', 'Chakra Petch', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        .card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            text-align: center;
        }

        h1 { font-size: 24px; margin-bottom: 5px; color: var(--primary); }
        p.subtitle { color: #666; font-size: 14px; margin-bottom: 25px; }

        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }

        label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 14px; color: var(--primary); }
        
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #eee;
            border-radius: 10px;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s;
            font-family: 'Inter';
        }

        input:focus { border-color: var(--primary); }

        .ip-box { background: #eef2f7; padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #d1d9e6; }

        button {
            width: 100%;
            padding: 15px;
            margin-top: 10px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn-run { background: var(--success); color: white; }
        .btn-zero { background: #6c757d; color: white; margin-top: 10px; font-size: 14px; padding: 10px; }
        
        button:active { transform: scale(0.98); opacity: 0.9; }

        .status-box {
            margin-top: 25px;
            padding: 15px;
            background: #f1f3f5;
            border-radius: 10px;
            font-size: 13px;
            color: #444;
            min-height: 20px;
        }

        .indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
            background: #ccc;
        }
        .online { background: #2ecc71; box-shadow: 0 0 8px #2ecc71; }
        .offline { background: var(--danger); }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h1>Motor Console</h1>
        <p class="subtitle">ระบบควบคุมระยะทางผ่านเน็ตเวิร์ก</p>

        <div class="ip-box">
            <div class="input-group">
                <label>ESP32 IP ADDRESS</label>
                <input type="text" id="esp_ip" placeholder="เช่น 192.168.1.50" value="">
            </div>
        </div>
        
        <div class="input-group">
            <label>ระยะทางที่ต้องการ (เมตร)</label>
            <input type="number" id="distance" placeholder="0.00" step="0.01">
        </div>

        <button class="btn-run" onclick="sendCommand('run')">
            <span>🚀</span> สั่งหมุนมอเตอร์ (RUN)
        </button>

        <button class="btn-zero" onclick="sendCommand('zero')">
            <span>🔄</span> เซ็ตตำแหน่งศูนย์ (ZERO)
        </button>

        <div class="status-box">
            <span id="led" class="indicator"></span>
            <span id="statusText">สถานะ: ใส่ IP แล้วกดเริ่มได้เลย</span>
        </div>
    </div>
</div>

<script>
    function sendCommand(action) {
        const ip = document.getElementById('esp_ip').value;
        const dist = document.getElementById('distance').value;
        const statusText = document.getElementById('statusText');
        const led = document.getElementById('led');

        if(!ip) {
            alert("กรุณากรอก IP Address ของบอร์ดก่อนครับ");
            return;
        }

        let url = `http://${ip}/${action}`;

        if(action === 'run') {
            if(!dist) { alert("กรุณาใส่ระยะทางก่อนครับ"); return; }
            url += `?dist=${dist}`;
        }

        statusText.innerText = "กำลังส่งคำสั่งไปที่ " + ip + "...";
        led.classList.remove('online', 'offline');

        // ใช้ fetch โดยเปิดโหมดปกติ (ใน Arduino เราใส่ enableCORS ไว้แล้ว)
        fetch(url)
            .then(response => {
                if(response.ok) {
                    statusText.innerText = "สำเร็จ: " + action.toUpperCase();
                    led.classList.add('online');
                } else {
                    throw new Error();
                }
            })
            .catch(err => {
                // ถ้า fetch ติดเรื่อง Mixed Content (HTTPS -> HTTP) 
                // ข้อความนี้จะเตือนให้ผู้ใช้ไปตั้งค่า Browser
                statusText.innerText = "Error: ไม่สามารถติดต่อบอร์ดได้ \n(ตรวจสอบ IP หรือตั้งค่า Insecure Content ในเบราว์เซอร์)";
                led.classList.add('offline');
                console.error("Fetch error:", err);
            });
    }

    // จำค่า IP ล่าสุดไว้ในเครื่อง (ไม่ต้องกรอกใหม่ทุกครั้งที่เปิดเว็บ)
    document.getElementById('esp_ip').value = localStorage.getItem('last_ip') || "";
    document.getElementById('esp_ip').onchange = (e) => localStorage.setItem('last_ip', e.target.value);
</script>

</body>
</html>
